services:
  # The Interface (Vite/React)
  frontend:
    build: ./frontend
    container_name: ceivoice_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules # Prevents local node_modules from overwriting container ones
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - app

  # The Backend Engine (Node.js)
  app:
    build: ./backend
    container_name: ceivoice_backend
    restart: always
    env_file: .env  
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=support_user
      - DB_PASSWORD=support_password
      - DB_NAME=ceivoice
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS} # Pulls from your local .env file
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  # The Database (MySQL)
  db:
    image: mysql:8.0
    container_name: ceivoice_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ceivoice
      MYSQL_USER: support_user
      MYSQL_PASSWORD: support_password
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306" 
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

  # The Control Panel (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ceivoice_admin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
